# Dependabot will run on day 26 of each month at 03:43 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "cron"
      day: 14
      timezone: "Europe/Berlin"
      cronjob: "43 3 26 * *"
    open-pull-requests-limit: 15
    assignees:
      - "Flixhummel"
    versioning-strategy: "increase"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      day: 14
      timezone: "Europe/Berlin"
      cronjob: "43 3 26 * *"
    open-pull-requests-limit: 15
    assignees:
      - "Flixhummel"
